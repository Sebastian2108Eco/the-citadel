name: Deploy The Citadel

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies (Frontend)
        run: |
          cd web
          npm install
          npm run build

      - name: Install dependencies (Backend)
        run: |
          cd api
          npm install

      - name: Success Message
        run: echo "El Build y el despliegue automático fueron exitosos."